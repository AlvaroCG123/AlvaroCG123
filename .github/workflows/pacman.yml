name: Generate Pacman Retro
on:
  schedule: [{cron: "0 0 * * *"}] # Roda todo dia
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AlvaroCG123
          template: repository
          filename: pacman-retro.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          # Aqui está a mágica do Pacman
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          config_timezone: America/Sao_Paulo
          
          # Customização para o estilo Pacman Retro
          output_action: commit
          committer_branch: output
          committer_message: "Update Pacman Retro"
